name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Set environment variables
        run: |
          echo "DATABASE_URL=file:local.db" >> $GITHUB_ENV
          echo "MQTT_URL=mqtt://test.mosquitto.org" >> $GITHUB_ENV

      - name: Setup db
        run: bun run db:migrate

      - name: Build
        run: bun run build
        
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag shit:$(date +%s)
