name: Build

on:
  push:
  workflow_dispatch:

env:
  BUILD_PATH: "."

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: ${{ env.BUILD_PATH }}

      - name: Setup db
        run: |
          bun run db:migrate
          echo "DATABASE_URL=file:local.db" >> $GITHUB_ENV
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build
        run: bun run build
        working-directory: ${{ env.BUILD_PATH }}
